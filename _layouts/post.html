---
layout: default
---
<div style="text-align: center; border-bottom: 1px dashed var(--accent); padding-bottom: 20px; margin-bottom: 30px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">{{ page.title }}</h1>
    <p style="font-style: italic; color: var(--accent);">Đăng ngày: {{ page.date | date: "%d/%m/%Y" }} | Danh mục: {{ page.category }}</p>
</div>
<div style="text-align: justify; font-size: 1.1em; line-height: 2;">
    {{ content }}
</div>
