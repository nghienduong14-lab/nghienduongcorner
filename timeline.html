---
layout: default
title: Dòng Chảy Định Mệnh
---
<style>
    .page-header { text-align: center; margin-bottom: 4rem; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); }
    .page-header h2 { font-size: 2.5rem; color: var(--text-color); margin-bottom: 10px; }
    .page-header p { font-style: italic; color: var(--accent); font-size: 1.1rem; }

    /* KHUNG ĐƯỜNG THỜI GIAN */
    .timeline { position: relative; max-width: 900px; margin: 0 auto; padding: 2rem 0; }
    
    /* Sợi chỉ chạy dọc ở giữa */
    .timeline::after {
        content: ''; position: absolute; width: 2px;
        background-color: var(--accent);
        top: 0; bottom: 0; left: 50%; margin-left: -1px;
    }

    /* Các khối sự kiện */
    .timeline-item { padding: 10px 40px; position: relative; width: 50%; box-sizing: border-box; }
    /* Khối lẻ nằm bên trái */
    .timeline-item:nth-child(odd) { left: 0; text-align: right; }
    /* Khối chẵn nằm bên phải */
    .timeline-item:nth-child(even) { left: 50%; text-align: left; }

    /* Dấu chấm tròn trên trục thời gian */
    .timeline-dot {
        position: absolute; width: 16px; height: 16px; 
        background-color: var(--card-bg); border: 4px solid var(--accent);
        top: 25px; border-radius: 50%; z-index: 1;
        transition: background-color 0.3s;
    }
    .timeline-item:nth-child(odd) .timeline-dot { right: -12px; }
    .timeline-item:nth-child(even) .timeline-dot { left: -12px; }
    .timeline-item:hover .timeline-dot { background-color: var(--accent); }

    /* Khung nội dung */
    .timeline-content {
        padding: 25px; background-color: var(--card-bg);
        position: relative; border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        border: 1px solid var(--border-color);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .timeline-content:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

    /* Cục bọc Năm (Year Badge) */
    .time-badge {
        display: inline-block; padding: 5px 15px; background: var(--first-snow);
        color: var(--mystification) !important; border-radius: 20px; font-weight: bold;
        font-size: 0.85rem; margin-bottom: 15px; border: 1px solid var(--light-steel-blue);
    }
    [data-theme="dark"] .time-badge { background: var(--mystification); color: var(--first-snow) !important; border: 1px solid var(--orbital); }

    .timeline-title { font-family: 'Playfair Display', serif; color: var(--text-color); margin: 0 0 10px 0; font-size: 1.4rem; }
    .timeline-desc { font-size: 0.95rem; line-height: 1.6; color: var(--text-color); opacity: 0.9; margin: 0; text-align: justify; }
    
    .au-tag { 
        display: inline-block; font-style: italic; color: var(--accent); font-size: 0.85rem; 
        margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); width: 100%;
    }
    [data-theme="dark"] .au-tag { border-top: 1px solid rgba(255,255,255,0.05); }

    /* ĐÁP ỨNG CHO ĐIỆN THOẠI (Responsive) */
    @media screen and (max-width: 768px) {
        .timeline::after { left: 31px; } /* Đẩy sợi chỉ sang rìa trái */
        .timeline-item { width: 100%; padding-left: 70px; padding-right: 0; }
        .timeline-item:nth-child(even), .timeline-item:nth-child(odd) { left: 0; text-align: left; }
        .timeline-item:nth-child(odd) .timeline-dot, .timeline-item:nth-child(even) .timeline-dot { left: 22px; right: auto; }
        .timeline-desc { text-align: left; }
    }
</style>

<div class="page-header">
    <h2>Dòng Chảy Định Mệnh</h2>
    <p>Biên niên sử của những cõi mộng và ký ức bị lãng quên.</p>
</div>

<div class="timeline">
    <!-- Vòng lặp lấy dữ liệu từ file _data/timeline.yml -->
    {% for event in site.data.timeline %}
    <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content">
            <span class="time-badge">{{ event.year }}</span>
            <h3 class="timeline-title">{{ event.title }}</h3>
            <p class="timeline-desc">{{ event.description }}</p>
            <span class="au-tag">✦ Vũ trụ: {{ event.au }}</span>
        </div>
    </div>
    {% endfor %}
</div>
