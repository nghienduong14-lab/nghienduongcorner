---
layout: default
title: Fanfiction
---
<style>
    .section-title { text-align: center; margin-bottom: 2.5rem; font-size: 2rem; color: var(--text-color); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
    .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.06); transition: transform 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
    .card-img { width: 100%; height: 220px; object-fit: cover; object-position: center; border-bottom: 3px solid var(--light-steel-blue); }
    [data-theme="dark"] .card-img { border-bottom: 3px solid var(--orbital); opacity: 0.85; }
    .card-content { padding: 1.5rem; }
    .card-title { margin: 0 0 10px 0; font-size: 1.5rem; }
    .card-title a { color: var(--text-color); }
    .card-meta { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    
    .tag { display: inline-block; background: var(--first-snow); color: var(--mystification) !important; padding: 3px 12px; border-radius: 15px; border: 1px solid var(--light-steel-blue); transition: all 0.2s ease; }
    .tag:hover { background: var(--light-steel-blue); color: var(--mystification) !important; transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); opacity: 1; }
    [data-theme="dark"] .tag { background: var(--mystification); color: var(--first-snow) !important; border: 1px solid var(--orbital); }
    [data-theme="dark"] .tag:hover { background: var(--astronaut); }

    /* --- CSS MỚI CHO PHẦN QUOTE --- */
    .card-quote {
        font-size: 0.95em;
        font-style: italic;
        margin: 15px 0 0 0;
        padding: 12px 15px 12px 25px;
        border-left: 4px solid var(--accent);
        background-color: var(--first-snow);
        color: var(--mystification);
        border-radius: 0 8px 8px 0;
        position: relative;
        line-height: 1.6;
    }
    [data-theme="dark"] .card-quote {
        background-color: var(--mystification);
        color: var(--first-snow);
    }
    .card-quote::before {
        content: "“";
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem;
        color: var(--accent);
        position: absolute;
        left: 5px;
        top: -15px;
        opacity: 0.2;
        line-height: 1;
    }
</style>

<h2 class="section-title" id="page-title">Tất cả Fanfiction</h2>

<div class="grid" id="fic-grid">
    {% for post in site.posts %}
    <div class="card fic-item" data-tags="{{ post.tags | join: ',' | downcase }}">
        <img src="{{ post.image }}" alt="{{ post.title }}" class="card-img">
        <div class="card-content">
            <h3 class="card-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
            <div class="card-meta">
                <span>Danh mục: {{ post.category }}</span> • 
                {% for tag in post.tags %}
                <a href="{{ '/fanfiction.html?tag=' | relative_url }}{{ tag }}" class="tag">#{{ tag }}</a>
                {% endfor %}
            </div>
            
            <div class="card-quote">
                {{ post.excerpt | strip_html | truncatewords: 25 }}
            </div>

        </div>
    </div>
    {% endfor %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const currentTag = urlParams.get('tag');

        if (currentTag) {
            document.getElementById('page-title').innerText = 'Chuyên mục: ' + currentTag;
            
            const cards = document.querySelectorAll('.fic-item');
            const searchTag = currentTag.toLowerCase();
            let hasPost = false;
            
            cards.forEach(card => {
                const tags = card.getAttribute('data-tags');
                if (tags.includes(searchTag)) {
                    card.style.display = 'block';
                    hasPost = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (!hasPost) {
                document.getElementById('fic-grid').innerHTML = '<p style="text-align: center; width: 100%; color: var(--accent); font-style: italic;">Hiện chưa có fic nào trong chuyên mục này.</p>';
            }
        }
    });
</script>
