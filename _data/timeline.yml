  description: "Ngự sử dâng sớ tố cáo Hi Vương thông đồng với địch. Thừa Vĩnh Đế nổi giận ban thánh chỉ tru di cửu tộc."

- year: "Năm Thừa Vĩnh thứ mười hai"
