- year: "Năm Tĩnh An thứ ba mươi tám"
  character: Tuyên Tế Linh
  au: "Nguyệt Mộng"
  title: "Nội phản"
  description: "Giặc ngoại xâm đánh thẳng vào Tuyên Kinh. Tứ Hoàng Tử dưới sự trợ giúp của Hi Vương và các gia tộc đã đánh lui quân địch."

- year: "Năm Thừa Vĩnh thứ nhất"
  character: Tuyên Tế Linh
  au: "Nguyệt Mộng"
  title: "Tứ Hoàng Tử đăng cơ"
  description: "Tứ Hoàng Tử đăng cơ, lấy hiệu là Thừa Vĩnh. Ban thưởng cho các gia tộc đã có công trong chiến trận."

- year: "Năm Thừa Vĩnh thứ ba"
  character: Tuyên Tế Linh
  au: "Nguyệt Mộng"
  title: "Tố cáo nội phản"
  description: "Ngự sử dâng sớ tố cáo Hi Vương thông đồng với địch. Thừa Vĩnh Đế nổi giận ban thánh chỉ tru di cửu tộc."

- year: "Năm Thừa Vĩnh thứ mười hai"
  character: Tuyên Tế Linh
  au: "Nguyệt Mộng"
  title: "Thái tử Tuyên Diễn băng hà"
  description: "Thái tử băng hà. Thừa Vĩnh Đế chìm trong thuật trường sinh, bỏ bê triều chính. Ngọc Trạch tới Minh Ung dạy học. Hoa Thầm thoát ly Ám Trai."

- year: "Năm Thừa Vĩnh thứ mười bốn"
  character: Tuyên Tế Linh
  au: "Nguyệt Mộng"
  title: "Nhập học tại Minh Ung"
  description: "Tuyên Tế Linh nhập học tại Minh Ung, gặp lại Ngọc Trạch. Bắt đầu điều tra Ám Trai và Hi Vương Án cùng đồng môn."
